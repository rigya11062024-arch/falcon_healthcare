<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Login</title>
<style>
body{font-family:Poppins;background:#0f172a;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.box{background:#1e293b;padding:30px;border-radius:12px;width:300px}
input,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none}
button{background:#22c55e;color:#000;font-weight:bold}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBFIixlBvuXCLBv4PbtY-JmWKkD-CwKfcs",
  authDomain: "your-clinic-52542.firebaseapp.com",
  projectId: "your-clinic-52542"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async ()=>{
  const e=email.value,p=password.value;
  await signInWithEmailAndPassword(auth,e,p);
  if(e==="admin@gmail.com") location="admin.html";
  else location="index.html";
}

window.register = async ()=>{
  await createUserWithEmailAndPassword(auth,email.value,password.value);
  alert("Registered");
}
</script>
</body>
</html>
